version: "3.9"

services:
  selfstream:
    image: ghcr.io/s3lfcod3r/selfstream:latest
    container_name: selfstream
    restart: unless-stopped
    ports:
      - "8000:8000"   # IPTV Proxy – für alle User (m3u + streams)
      - "8080:8080"   # Admin Panel – nur du
    volumes:
      - /mnt/user/appdata/selfstream/data:/data
    environment:
      - DB_PATH=/data/selfstream.db
      # Werte aus einer .env-Datei im selben Verzeichnis werden hier übernommen
      # (so wirkt das von setup.sh erzeugte .env). Leere Defaults = kein Fehler,
      # falls keine .env vorhanden ist; dann greift die Web-Einrichtung.
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - BASE_URL=${BASE_URL:-}
      - PROXY_URL=${PROXY_URL:-}
      # ── Hinweise ──────────────────────────────────────────────────────────────
      # BASE_URL  = Admin-Panel-URL, z.B. http://192.168.1.69:8080
      # PROXY_URL = URL über die Streams erreichbar sind:
      #   Lokal (nur Heimnetz):       http://192.168.1.69:8000
      #   Subdomain (auch Internet):  https://iptv.deine-domain.de  (Reverse Proxy auf 8000)
